<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XMLike</title>
  <style>
    :root {
      color-scheme: light;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --accent-cyan: #06b6d4;
      --accent-red: #ef3340;
      --brand-gradient: linear-gradient(100deg, #075ea8 0%, #08bfd2 52%, #ef3340 100%);
      --background: #f1f5f9;
      --surface: #ffffff;
      --surface-muted: #f4f6fa;
      --editor: #fbfcff;
      --text: #222536;
      --muted: #697086;
      --border: #d5dae6;
      --error: #b4232d;
      --error-bg: #fff1f2;
      --success: #087a55;
      --success-bg: #ecf9f3;
      --focus: rgba(37, 99, 235, .24);
      --shadow: 0 10px 30px rgba(15, 23, 42, .08);
      --button-red-bg: #fff0f1;
      --button-red-hover: #ffe0e3;
      --button-red-active: #ffc7cc;
      --button-red-border: #f4a0a7;
      --button-red-text: #a51d2a;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --accent-cyan: #22d3ee;
      --accent-red: #ff525c;
      --brand-gradient: linear-gradient(100deg, #60a5fa 0%, #22d3ee 52%, #ff525c 100%);
      --background: #0f172a;
      --surface: #172033;
      --surface-muted: #202b40;
      --editor: #111827;
      --text: #f1f5f9;
      --muted: #aab6ca;
      --border: #334155;
      --error: #ffb2b7;
      --error-bg: #3a2026;
      --success: #79d8b2;
      --success-bg: #17342a;
      --focus: rgba(96, 165, 250, .32);
      --shadow: 0 12px 36px rgba(0, 0, 0, .28);
      --button-red-bg: #402126;
      --button-red-hover: #58282f;
      --button-red-active: #71313a;
      --button-red-border: #a84f5a;
      --button-red-text: #ffd0d4;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        color-scheme: dark;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --accent-cyan: #22d3ee;
        --accent-red: #ff525c;
        --brand-gradient: linear-gradient(100deg, #60a5fa 0%, #22d3ee 52%, #ff525c 100%);
        --background: #0f172a;
        --surface: #172033;
        --surface-muted: #202b40;
        --editor: #111827;
        --text: #f1f5f9;
        --muted: #aab6ca;
        --border: #334155;
        --error: #ffb2b7;
        --error-bg: #3a2026;
        --success: #79d8b2;
        --success-bg: #17342a;
        --focus: rgba(96, 165, 250, .32);
        --shadow: 0 12px 36px rgba(0, 0, 0, .28);
        --button-red-bg: #402126;
        --button-red-hover: #58282f;
        --button-red-active: #71313a;
        --button-red-border: #a84f5a;
        --button-red-text: #ffd0d4;
      }
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 8% 0%, rgba(6, 182, 212, .10), transparent 30%),
        radial-gradient(circle at 92% 0%, rgba(239, 51, 64, .08), transparent 26%),
        var(--background);
      color: var(--text);
      font-family: Roboto, Arial, sans-serif;
      font-size: 14px;
      transition: background-color .2s ease, color .2s ease;
    }

    button, textarea, input { font: inherit; }

    .app {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 12px;
      height: 100%;
      max-width: 1440px;
      margin: 0 auto;
      padding: 16px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .toolbar::before {
      content: '';
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      background: var(--brand-gradient);
    }

    .brand {
      margin: 0 auto 0 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.02em;
      background: var(--brand-gradient);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    button {
      min-height: 36px;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background-color .15s ease, border-color .15s ease, color .15s ease, transform .15s ease;
    }

    button:hover { background: var(--surface-muted); transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    select {
      min-height: 36px;
      padding: 7px 30px 7px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
    }

    .theme-control {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    button:focus-visible, textarea:focus-visible, input:focus-visible, select:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 1px;
    }

    button.primary {
      border-color: transparent;
      background: linear-gradient(110deg, #d91f3d, #f05a61);
      color: #fff;
      box-shadow: 0 5px 14px rgba(217, 31, 61, .28);
    }

    button.primary:hover {
      background: linear-gradient(110deg, #b91431, #df3f4b);
    }

    button.action-red {
      border-color: var(--button-red-border);
      background: var(--button-red-bg);
      color: var(--button-red-text);
    }

    button.action-red:hover { background: var(--button-red-hover); }
    button.action-red:active { background: var(--button-red-active); }

    button.action-red:active,
    button.primary:active {
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, .16);
      transform: translateY(1px) scale(.98);
    }

    .editor-shell {
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    #editor {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 320px;
      resize: none;
      border: 0;
      padding: 20px;
      background: var(--editor);
      color: var(--text);
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 15px;
      line-height: 1.6;
      tab-size: 2;
    }

    .status-area {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .status-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-muted);
    }

    .status-header strong { font-size: 14px; }
    #summary { color: var(--muted); }

    #messages {
      max-height: 160px;
      margin: 0;
      padding: 10px 12px 10px 32px;
      overflow: auto;
    }

    #messages.success {
      list-style: none;
      padding-left: 12px;
      color: var(--success);
      background: var(--success-bg);
    }

    #messages.errors {
      color: var(--error);
      background: var(--error-bg);
      border-left: 3px solid var(--accent-red);
    }

    #messages li + li { margin-top: 5px; }

    .shortcut { color: var(--muted); font-size: 12px; }
    .action-red .shortcut { color: inherit; opacity: .72; }
    #fileInput { display: none; }

    dialog {
      width: min(420px, calc(100% - 32px));
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0;
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 18px 50px rgba(0, 0, 0, .25);
    }

    dialog::backdrop { background: rgba(0, 0, 0, .42); }

    .dialog-content { padding: 20px; }
    .dialog-content h2 { margin: 0 0 16px; font-size: 18px; }
    .dialog-content label { display: block; margin-bottom: 6px; font-weight: 600; }

    .dialog-content input {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
    }

    .dialog-error { min-height: 20px; margin: 6px 0 0; color: var(--error); font-size: 13px; }
    .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }

    @media (max-width: 720px) {
      .app { padding: 10px; }
      .brand { width: 100%; }
      .shortcut { display: none; }
      button { flex: 1 1 auto; }
      .theme-control { flex: 1 1 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="toolbar" aria-label="Ações do documento">
      <h1 class="brand">XMLike</h1>
      <button id="newButton" class="action-red" type="button">Novo</button>
      <button id="openButton" class="action-red" type="button">Abrir</button>
      <button id="clauseButton" class="action-red" type="button" title="Alt+C">Cláusula <span class="shortcut">Alt+C</span></button>
      <button id="tagButton" class="action-red" type="button" title="Alt+T">Tag <span class="shortcut">Alt+T</span></button>
      <button id="subtagButton" class="action-red" type="button" title="Alt+S ou Alt+Shift+T">Subtag <span class="shortcut">Alt+S</span></button>
      <button id="formatButton" class="primary" type="button" title="Ctrl+Alt+F">Formatar e renumerar</button>
      <button id="exportTxtButton" class="action-red" type="button">Exportar .txt</button>
      <button id="exportMdButton" class="action-red" type="button">Exportar .md</button>
      <label class="theme-control" for="themeSelect">
        Tema
        <select id="themeSelect" aria-label="Tema visual">
          <option value="system">Sistema</option>
          <option value="light">Claro</option>
          <option value="dark">Escuro</option>
        </select>
      </label>
      <input id="fileInput" type="file" accept=".txt,.md,text/plain,text/markdown">
    </header>

    <section class="editor-shell" aria-label="Editor do documento">
      <textarea id="editor" spellcheck="true" aria-describedby="summary"></textarea>
    </section>

    <section class="status-area" aria-live="polite">
      <div class="status-header">
        <strong>Validação</strong>
        <span id="summary"></span>
      </div>
      <ul id="messages"></ul>
    </section>
  </main>

  <dialog id="nameDialog">
    <form id="nameForm" class="dialog-content">
      <h2 id="dialogTitle">Inserir tag</h2>
      <label for="tagName">Nome da tag</label>
      <input id="tagName" autocomplete="off" maxlength="60" placeholder="exemplo">
      <p id="dialogError" class="dialog-error"></p>
      <div class="dialog-actions">
        <button id="cancelDialog" type="button">Cancelar</button>
        <button class="primary" type="submit">Inserir</button>
      </div>
    </form>
  </dialog>

  <script>
    (() => {
      'use strict';

      const RESTRICTIONS = 'restricoes';
      const EMPTY_DOCUMENT = '<restricoes>\n</restricoes>';
      const STORAGE_KEY = 'xmLike.document';
      const THEME_STORAGE_KEY = 'xmLike.theme';
      const TAG_NAME_PATTERN = /^[A-Za-zÀ-ÖØ-öø-ÿ_][A-Za-zÀ-ÖØ-öø-ÿ0-9_-]*$/;
      const OPEN_TAG_PATTERN = /^<([A-Za-zÀ-ÖØ-öø-ÿ_][A-Za-zÀ-ÖØ-öø-ÿ0-9_-]*)>$/;
      const CLOSE_TAG_PATTERN = /^<\/([A-Za-zÀ-ÖØ-öø-ÿ_][A-Za-zÀ-ÖØ-öø-ÿ0-9_-]*)>$/;
      const CLAUSE_PATTERN = /^(\d+)\.\s*(.*)$/;

      const editor = document.querySelector('#editor');
      const fileInput = document.querySelector('#fileInput');
      const messages = document.querySelector('#messages');
      const summary = document.querySelector('#summary');
      const themeSelect = document.querySelector('#themeSelect');
      const nameDialog = document.querySelector('#nameDialog');
      const nameForm = document.querySelector('#nameForm');
      const tagName = document.querySelector('#tagName');
      const dialogTitle = document.querySelector('#dialogTitle');
      const dialogError = document.querySelector('#dialogError');
      let pendingTagKind = 'tag';
      let validationTimer;

      function tokenize(text) {
        const stack = [];
        const tokens = [];
        const errors = [];
        const lines = text.replace(/\r\n?/g, '\n').split('\n');

        lines.forEach((source, index) => {
          const lineNumber = index + 1;
          const value = source.trim();
          if (!value) {
            tokens.push({ type: 'blank', source, lineNumber, depth: stack.length });
            return;
          }

          const openMatch = value.match(OPEN_TAG_PATTERN);
          if (openMatch) {
            const name = openMatch[1];
            tokens.push({ type: 'open', name, source, lineNumber, depth: stack.length });
            stack.push({ name, lineNumber });
            return;
          }

          const closeMatch = value.match(CLOSE_TAG_PATTERN);
          if (closeMatch) {
            const name = closeMatch[1];
            const expected = stack.at(-1);
            tokens.push({ type: 'close', name, source, lineNumber, depth: Math.max(0, stack.length - 1) });
            if (!expected) {
              errors.push(error(lineNumber, `Tag de fechamento </${name}> sem abertura.`));
            } else if (expected.name !== name) {
              errors.push(error(lineNumber, `Tag </${name}> mal posicionada; esperado </${expected.name}>.`));
              const matchingIndex = stack.map(item => item.name).lastIndexOf(name);
              if (matchingIndex >= 0) stack.splice(matchingIndex, 1);
            } else {
              stack.pop();
            }
            return;
          }

          const clauseMatch = value.match(CLAUSE_PATTERN);
          if (clauseMatch) {
            const number = Number(clauseMatch[1]);
            const content = clauseMatch[2].trim();
            tokens.push({ type: 'clause', number, content, source, lineNumber, depth: stack.length });
            if (!stack.length) errors.push(error(lineNumber, 'Cláusula fora de uma tag.'));
            if (!content) errors.push(error(lineNumber, 'Cláusula vazia.'));
            return;
          }

          if (stack.length) {
            tokens.push({
              type: 'clause',
              number: null,
              content: value,
              source,
              lineNumber,
              depth: stack.length,
              implicit: true
            });
            return;
          }

          tokens.push({ type: 'invalid', source, lineNumber, depth: stack.length });
          if (value.startsWith('<') || value.endsWith('>')) {
            errors.push(error(lineNumber, 'Tag inválida. Use somente <nome> ou </nome>, sem atributos.'));
          } else {
            errors.push(error(lineNumber, 'Linha inválida. Use uma tag ou uma cláusula numerada.'));
          }
        });

        stack.forEach(item => errors.push(error(item.lineNumber, `Tag <${item.name}> sem fechamento.`)));
        return { tokens, errors, lines };
      }

      function error(line, message) {
        return { line, message: `Linha ${line}: ${message}` };
      }

      function validate(text) {
        const parsed = tokenize(text);
        const errors = [...parsed.errors];
        const clauses = parsed.tokens.filter(token => token.type === 'clause');
        const restrictionOpenings = parsed.tokens.filter(token => token.type === 'open' && token.name === RESTRICTIONS);
        const topLevelOpenings = parsed.tokens.filter(token => token.type === 'open' && token.depth === 0);

        if (restrictionOpenings.length === 0) {
          errors.push({ line: 0, message: 'A tag <restricoes> é obrigatória.' });
        } else if (restrictionOpenings.length > 1) {
          errors.push(error(restrictionOpenings[1].lineNumber, 'Existe mais de uma tag <restricoes>.'));
        }

        if (restrictionOpenings.some(token => token.depth !== 0)) {
          const nested = restrictionOpenings.find(token => token.depth !== 0);
          errors.push(error(nested.lineNumber, 'A tag <restricoes> deve estar no nível principal.'));
        }

        const lastTopLevel = topLevelOpenings.at(-1);
        if (lastTopLevel && lastTopLevel.name !== RESTRICTIONS) {
          errors.push(error(lastTopLevel.lineNumber, 'A tag <restricoes> deve ser a última tag do documento.'));
        }

        validateNumbering(clauses, errors);
        return { errors, clauseCount: clauses.length };
      }

      function validateNumbering(clauses, errors) {
        const seen = new Set();
        clauses.forEach((clause, index) => {
          if (!Number.isSafeInteger(clause.number) || clause.number < 1) {
            errors.push(error(clause.lineNumber, 'Numeração inválida. Use um inteiro positivo.'));
          }
          if (seen.has(clause.number)) {
            errors.push(error(clause.lineNumber, `Numeração duplicada: ${clause.number}.`));
          }
          seen.add(clause.number);
          const expected = index + 1;
          if (clause.number !== expected) {
            errors.push(error(clause.lineNumber, `Quebra de sequência: esperado ${expected}, encontrado ${clause.number}.`));
          }
        });
      }

      function renderValidation() {
        const result = validate(editor.value);
        messages.replaceChildren();
        messages.className = result.errors.length ? 'errors' : 'success';
        summary.textContent = `${result.clauseCount} cláusula${result.clauseCount === 1 ? '' : 's'} · ${result.errors.length} erro${result.errors.length === 1 ? '' : 's'}`;

        if (!result.errors.length) {
          const item = document.createElement('li');
          item.textContent = 'Documento válido.';
          messages.append(item);
          return;
        }

        result.errors.forEach(issue => {
          const item = document.createElement('li');
          item.textContent = issue.message;
          if (issue.line > 0) {
            item.tabIndex = 0;
            item.title = 'Ir para esta linha';
            item.addEventListener('click', () => focusLine(issue.line));
            item.addEventListener('keydown', event => {
              if (event.key === 'Enter' || event.key === ' ') focusLine(issue.line);
            });
          }
          messages.append(item);
        });
      }

      function ensureRestrictions(text) {
        const parsed = tokenize(text);
        const hasRestrictions = parsed.tokens.some(token => token.type === 'open' && token.name === RESTRICTIONS);
        if (hasRestrictions) return text;
        const content = text.trimEnd();
        return content ? `${content}\n\n${EMPTY_DOCUMENT}` : EMPTY_DOCUMENT;
      }

      function formatAndRenumber() {
        const ensured = ensureRestrictions(editor.value);
        const parsed = tokenize(ensured);
        let clauseNumber = 1;
        const output = [];
        let previousWasBlank = false;

        parsed.tokens.forEach(token => {
          if (token.type === 'blank') {
            if (output.length && !previousWasBlank) output.push('');
            previousWasBlank = true;
            return;
          }

          const indent = '  '.repeat(Math.max(0, token.depth));
          if (token.type === 'open') output.push(`${indent}<${token.name}>`);
          else if (token.type === 'close') output.push(`${indent}</${token.name}>`);
          else if (token.type === 'clause') output.push(`${indent}${clauseNumber++}. ${token.content}`);
          else output.push(`${indent}${token.source.trim()}`);
          previousWasBlank = false;
        });

        setEditorValue(output.join('\n').replace(/\n{3,}/g, '\n\n').trim() + '\n', 0, false);
        editor.setSelectionRange(editor.value.length, editor.value.length);
        editor.focus();
      }

      function nextClauseNumber() {
        const numbers = tokenize(editor.value).tokens
          .filter(token => token.type === 'clause' && Number.isSafeInteger(token.number))
          .map(token => token.number);
        return numbers.length ? Math.max(...numbers) + 1 : 1;
      }

      function insertClause() {
        const number = nextClauseNumber();
        const insertion = `${number}. `;
        insertAtCursor(insertion, insertion.length);
      }

      function normalizeAutomaticClauses() {
        const original = editor.value;
        const lines = original.split('\n');
        const stack = [];
        const replacements = [];
        let expectedNumber = 1;
        let lineStart = 0;

        lines.forEach(line => {
          const value = line.trim();
          const indentationLength = line.length - line.trimStart().length;
          const contentStart = lineStart + indentationLength;
          const openMatch = value.match(OPEN_TAG_PATTERN);
          const closeMatch = value.match(CLOSE_TAG_PATTERN);
          const clauseMatch = value.match(CLAUSE_PATTERN);

          if (openMatch) {
            stack.push(openMatch[1]);
          } else if (closeMatch) {
            if (stack.at(-1) === closeMatch[1]) stack.pop();
          } else if (clauseMatch) {
            const numberLength = clauseMatch[1].length;
            if (clauseMatch[1] !== String(expectedNumber)) {
              replacements.push({ start: contentStart, end: contentStart + numberLength, text: String(expectedNumber) });
            }
            expectedNumber += 1;
          } else if (value && stack.length && !value.startsWith('<')) {
            replacements.push({ start: contentStart, end: contentStart, text: `${expectedNumber}. ` });
            expectedNumber += 1;
          }

          lineStart += line.length + 1;
        });

        if (!replacements.length) return;
        const selectionStart = mapPosition(editor.selectionStart, replacements);
        const selectionEnd = mapPosition(editor.selectionEnd, replacements);
        let normalized = original;
        [...replacements].reverse().forEach(replacement => {
          normalized = normalized.slice(0, replacement.start) + replacement.text + normalized.slice(replacement.end);
        });
        editor.value = normalized;
        editor.setSelectionRange(selectionStart, selectionEnd);
      }

      function mapPosition(position, replacements) {
        let mapped = position;
        replacements.forEach(replacement => {
          if (position < replacement.start) return;
          const removedLength = replacement.end - replacement.start;
          const delta = replacement.text.length - removedLength;
          if (position >= replacement.end) mapped += delta;
          else mapped = replacement.start + replacement.text.length;
        });
        return mapped;
      }

      function handleEditorInput() {
        normalizeAutomaticClauses();
        saveAndValidate();
      }

      function handleEditorEnter(event) {
        if (event.key !== 'Enter' || event.ctrlKey || event.altKey || event.metaKey) return;
        const lineStart = editor.value.lastIndexOf('\n', editor.selectionStart - 1) + 1;
        const lineEndIndex = editor.value.indexOf('\n', editor.selectionStart);
        const lineEnd = lineEndIndex < 0 ? editor.value.length : lineEndIndex;
        const currentLine = editor.value.slice(lineStart, lineEnd);
        if (!currentLine.trim().match(CLAUSE_PATTERN) || !findContainingTag(editor.selectionStart)) return;

        event.preventDefault();
        const indentation = currentLine.match(/^\s*/)?.[0] || '';
        const insertion = `\n${indentation}${nextClauseNumber()}. `;
        const start = editor.selectionStart;
        editor.setRangeText(insertion, start, editor.selectionEnd, 'end');
        normalizeAutomaticClauses();
        saveAndValidate();
      }

      function handleClauseTermination(event) {
        if (event.key !== '.' || event.ctrlKey || event.altKey || event.metaKey) return;
        if (editor.selectionStart !== editor.selectionEnd) return;

        const lineStart = editor.value.lastIndexOf('\n', editor.selectionStart - 1) + 1;
        const lineEndIndex = editor.value.indexOf('\n', editor.selectionStart);
        const lineEnd = lineEndIndex < 0 ? editor.value.length : lineEndIndex;
        if (editor.selectionStart !== lineEnd) return;

        const currentLine = editor.value.slice(lineStart, lineEnd);
        const clauseMatch = currentLine.trim().match(CLAUSE_PATTERN);
        if (!clauseMatch || !clauseMatch[2].trim() || !findContainingTag(editor.selectionStart)) return;

        event.preventDefault();
        const indentation = currentLine.match(/^\s*/)?.[0] || '';
        const insertion = `.\n${indentation}${nextClauseNumber()}. `;
        editor.setRangeText(insertion, editor.selectionStart, editor.selectionEnd, 'end');
        normalizeAutomaticClauses();
        saveAndValidate();
      }

      function splitPastedText(text) {
        const normalized = text.replace(/\r\n?/g, '\n').trim();
        if (!normalized) return [];
        return (normalized.match(/[^.\n]*\.(?:\s+|$)|[^.\n]+/g) || [])
          .map(part => part.trim())
          .filter(Boolean);
      }

      function handleEditorPaste(event) {
        const text = event.clipboardData?.getData('text/plain') || '';
        if (!text || !findContainingTag(editor.selectionStart)) return;
        if (text.split(/\r?\n/).some(line => OPEN_TAG_PATTERN.test(line.trim()) || CLOSE_TAG_PATTERN.test(line.trim()))) return;

        const clauses = splitPastedText(text);
        if (!clauses.length) return;
        event.preventDefault();

        const lineStart = editor.value.lastIndexOf('\n', editor.selectionStart - 1) + 1;
        const currentPrefix = editor.value.slice(lineStart, editor.selectionStart);
        const currentClause = currentPrefix.trim().match(CLAUSE_PATTERN);
        const indentation = currentPrefix.match(/^\s*/)?.[0] || '';
        let number = nextClauseNumber();
        let insertion;

        if (currentClause) {
          const separator = currentClause[2].trim() && !/\s$/.test(currentPrefix) ? ' ' : '';
          insertion = separator + clauses[0];
          clauses.slice(1).forEach(clause => {
            insertion += `\n${indentation}${number++}. ${clause}`;
          });
        } else {
          insertion = clauses.map(clause => `${number++}. ${clause}`).join(`\n${indentation}`);
        }

        if (text.trimEnd().endsWith('.')) {
          insertion += `\n${indentation}${number}. `;
        }

        editor.setRangeText(insertion, editor.selectionStart, editor.selectionEnd, 'end');
        normalizeAutomaticClauses();
        saveAndValidate();
      }

      function openTagDialog(kind) {
        pendingTagKind = kind;
        dialogTitle.textContent = kind === 'subtag' ? 'Inserir subtag' : 'Inserir tag';
        tagName.value = '';
        dialogError.textContent = '';
        nameDialog.showModal();
        requestAnimationFrame(() => tagName.focus());
      }

      function insertNamedTag(name, kind) {
        if (name === RESTRICTIONS) {
          dialogError.textContent = 'A tag <restricoes> é gerenciada automaticamente.';
          return false;
        }

        if (kind === 'subtag' && !findContainingTag(editor.selectionStart)) {
          dialogError.textContent = 'Posicione o cursor dentro de uma tag para inserir uma subtag.';
          return false;
        }

        const indentation = currentLineIndent();
        const innerIndent = kind === 'subtag' ? `${indentation}  ` : indentation;
        const structure = `<${name}>\n${innerIndent}\n${indentation}</${name}>`;
        insertAtCursor(structure, `<${name}>\n${innerIndent}`.length);
        return true;
      }

      function findContainingTag(position) {
        const before = editor.value.slice(0, position);
        const parsed = tokenize(before);
        const stack = [];
        parsed.tokens.forEach(token => {
          if (token.type === 'open') stack.push(token.name);
          if (token.type === 'close' && stack.at(-1) === token.name) stack.pop();
        });
        return stack.at(-1) || null;
      }

      function currentLineIndent() {
        const lineStart = editor.value.lastIndexOf('\n', editor.selectionStart - 1) + 1;
        return editor.value.slice(lineStart, editor.selectionStart).match(/^\s*/)?.[0] || '';
      }

      function insertAtCursor(text, caretOffset) {
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        const before = editor.value.slice(0, start);
        const after = editor.value.slice(end);
        const prefix = before && !before.endsWith('\n') ? '\n' : '';
        const suffix = after && !after.startsWith('\n') ? '\n' : '';
        const value = `${before}${prefix}${text}${suffix}${after}`;
        const caret = start + prefix.length + caretOffset;
        setEditorValue(value, caret, true);
      }

      function setEditorValue(value, caret, ensureRequired) {
        editor.value = ensureRequired ? ensureRestrictions(value) : value;
        const safeCaret = Math.min(caret, editor.value.length);
        editor.setSelectionRange(safeCaret, safeCaret);
        normalizeAutomaticClauses();
        saveAndValidate();
        editor.focus();
      }

      function focusLine(lineNumber) {
        const lines = editor.value.split('\n');
        const position = lines.slice(0, Math.max(0, lineNumber - 1)).reduce((total, line) => total + line.length + 1, 0);
        editor.focus();
        editor.setSelectionRange(position, position + (lines[lineNumber - 1]?.length || 0));
      }

      function saveAndValidate() {
        try { localStorage.setItem(STORAGE_KEY, editor.value); } catch { /* O editor continua funcional sem armazenamento. */ }
        clearTimeout(validationTimer);
        validationTimer = setTimeout(renderValidation, 120);
      }

      function applyTheme(theme) {
        if (theme === 'light' || theme === 'dark') {
          document.documentElement.dataset.theme = theme;
        } else {
          delete document.documentElement.dataset.theme;
          theme = 'system';
        }
        themeSelect.value = theme;
        try { localStorage.setItem(THEME_STORAGE_KEY, theme); } catch { /* Mantém o tema apenas na sessão. */ }
      }

      function repairRequiredTag() {
        const repaired = ensureRestrictions(editor.value);
        if (repaired !== editor.value) {
          const caret = editor.selectionStart;
          editor.value = repaired;
          editor.setSelectionRange(caret, caret);
        }
        saveAndValidate();
      }

      function newDocument() {
        if (editor.value.trim() !== EMPTY_DOCUMENT && !confirm('Criar um novo documento e substituir o conteúdo atual?')) return;
        setEditorValue(`${EMPTY_DOCUMENT}\n`, '<restricoes>\n'.length, false);
      }

      function openFile(file) {
        if (!file) return;
        const extension = file.name.split('.').pop()?.toLowerCase();
        if (!['txt', 'md'].includes(extension)) {
          alert('Selecione um arquivo .txt ou .md.');
          fileInput.value = '';
          return;
        }

        const reader = new FileReader();
        reader.onload = () => {
          const content = String(reader.result ?? '');
          if (editor.value.trim() !== EMPTY_DOCUMENT && !confirm('Abrir o arquivo e substituir o conteúdo atual?')) {
            fileInput.value = '';
            return;
          }
          setEditorValue(ensureRestrictions(content), 0, false);
          fileInput.value = '';
        };
        reader.onerror = () => {
          alert('Não foi possível abrir o arquivo.');
          fileInput.value = '';
        };
        reader.readAsText(file, 'UTF-8');
      }

      function exportDocument(extension) {
        const fileName = requestExportFileName(extension);
        if (!fileName) return;

        repairRequiredTag();
        const blob = new Blob([editor.value], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = fileName;
        document.body.append(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 0);
      }

      function requestExportFileName(extension) {
        const input = prompt(`Nome do arquivo .${extension}:`, 'prompt');
        if (input === null) return null;

        const withoutExtension = input.replace(/\.(txt|md)$/i, '');
        const sanitized = withoutExtension
          .replace(/[\\/:*?"<>|]/g, '')
          .trim()
          .replace(/[. ]+$/g, '');

        if (!sanitized) {
          alert('Informe um nome válido para o arquivo.');
          return null;
        }

        return `${sanitized}.${extension}`;
      }

      function handleShortcut(event) {
        if (event.ctrlKey && event.altKey && event.key.toLowerCase() === 'f') {
          event.preventDefault();
          formatAndRenumber();
          return;
        }
        if (!event.altKey || event.ctrlKey || event.metaKey) return;
        const key = event.key.toLowerCase();
        if (key === 'c') {
          event.preventDefault();
          insertClause();
        } else if ((key === 't' && event.shiftKey) || key === 's') {
          event.preventDefault();
          openTagDialog('subtag');
        } else if (key === 't') {
          event.preventDefault();
          openTagDialog('tag');
        }
      }

      document.querySelector('#newButton').addEventListener('click', newDocument);
      document.querySelector('#openButton').addEventListener('click', () => fileInput.click());
      document.querySelector('#clauseButton').addEventListener('click', insertClause);
      document.querySelector('#tagButton').addEventListener('click', () => openTagDialog('tag'));
      document.querySelector('#subtagButton').addEventListener('click', () => openTagDialog('subtag'));
      document.querySelector('#formatButton').addEventListener('click', formatAndRenumber);
      document.querySelector('#exportTxtButton').addEventListener('click', () => exportDocument('txt'));
      document.querySelector('#exportMdButton').addEventListener('click', () => exportDocument('md'));
      document.querySelector('#cancelDialog').addEventListener('click', () => nameDialog.close());
      themeSelect.addEventListener('change', () => applyTheme(themeSelect.value));
      fileInput.addEventListener('change', () => openFile(fileInput.files[0]));
      editor.addEventListener('input', handleEditorInput);
      editor.addEventListener('keydown', handleEditorEnter);
      editor.addEventListener('keydown', handleClauseTermination);
      editor.addEventListener('paste', handleEditorPaste);
      editor.addEventListener('blur', repairRequiredTag);
      document.addEventListener('keydown', handleShortcut);

      nameForm.addEventListener('submit', event => {
        event.preventDefault();
        const name = tagName.value.trim();
        if (!TAG_NAME_PATTERN.test(name)) {
          dialogError.textContent = 'Use letras, números, hífen ou sublinhado, sem espaços.';
          return;
        }
        if (insertNamedTag(name, pendingTagKind)) nameDialog.close();
      });

      let initialValue = EMPTY_DOCUMENT;
      try { initialValue = localStorage.getItem(STORAGE_KEY) || EMPTY_DOCUMENT; } catch { /* Usa documento vazio. */ }
      let initialTheme = 'system';
      try { initialTheme = localStorage.getItem(THEME_STORAGE_KEY) || 'system'; } catch { /* Usa o tema do sistema. */ }
      applyTheme(initialTheme);
      editor.value = ensureRestrictions(initialValue);
      renderValidation();
      editor.focus();
      editor.setSelectionRange(0, 0);
    })();
  </script>
</body>
</html>
